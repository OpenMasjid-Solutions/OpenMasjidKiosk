name: Build image

# Builds the kiosk APK, bundles it into the app image, and pushes multi-arch
# (amd64 + arm64) to GHCR as
#   ghcr.io/<owner>/<repo-name>:<manifest version>   (+ :latest)
# The repo is named OpenMasjidKiosk, so the image is
#   ghcr.io/openmasjid-solutions/openmasjidkiosk
# which is what docker-compose.yml references.
#
# After the FIRST successful run: make the GHCR package Public (org → Packages → package
# settings) so masjid hosts can pull it without authentication. Then copy the printed
# @sha256 digest into docker-compose.yml (the real integrity pin) and bump the manifest
# version for each release.

on:
  push:
    branches: [main]
    tags: ['v*']
    # Changes that don't affect the image — skip the (slow) multi-arch build.
    # docker-compose.yml is NOT in the image build context, so re-pinning the @sha256
    # digest there must not trigger a rebuild that would move the tag off that digest.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'screenshots/**'
      - 'LICENSE'
      - 'docker-compose.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Build (and sign, if secrets are set) the APK, exposed as the `kiosk-apk` artifact.
  apk:
    uses: ./.github/workflows/build-apk.yml
    secrets: inherit

  image:
    needs: apk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name + version
        id: meta
        run: |
          ver=$(grep -E '^version:' manifest.yaml | head -1 | sed -E 's/^version:[[:space:]]*//' | tr -d "\"' \r")
          [ -n "$ver" ] || ver=latest
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "name=$(echo "${GITHUB_REPOSITORY##*/}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      # Pull the freshly built APK into the build context so the Dockerfile bundles it.
      - name: Fetch built APK
        uses: actions/download-artifact@v4
        with:
          name: kiosk-apk
          path: apk

      - name: Confirm APK is present
        run: ls -la apk && test -f apk/openmasjidkiosk.apk

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.name }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # The @sha256 digest is the real integrity pin — copy it into docker-compose.yml.
      - name: Digest to pin in docker-compose.yml
        run: |
          echo "Pin this in docker-compose.yml:"
          echo "  image: ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.name }}:${{ steps.meta.outputs.version }}@${{ steps.build.outputs.digest }}"
