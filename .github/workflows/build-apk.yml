# Builds (and, when signing secrets are present, SIGNS) the Android kiosk APK and
# publishes it as the `kiosk-apk` artifact (a single file: openmasjidkiosk.apk). The
# versionName comes from the repo-root VERSION file (android/app/build.gradle.kts reads
# it), so the app version always matches the server image.
#
# This is a REUSABLE workflow (`workflow_call`) so build-image.yml can build the APK and
# bundle the FRESH result into the container image in the same run. It can also be run on
# its own (tags / manual) to attach a downloadable APK to a release.
#
# One-time setup to ship a Play/sideload-signed APK — add these repo Actions secrets:
#   SIGNING_KEYSTORE_BASE64   base64 of your upload keystore (.jks)
#   SIGNING_KEYSTORE_PASSWORD store password
#   SIGNING_KEY_ALIAS         key alias
#   SIGNING_KEY_PASSWORD      key password
# Without them the job still produces a DEBUG-signed APK so the pipeline never blocks
# (fine for testing; sideloading a debug APK works, but ship a release-signed one).
#
# NOTE: Android CI specifics (SDK components, AGP/Gradle/JDK alignment) could not be
# validated on the dev machine (JDK 8 only). Confirm on the first CI run.

on:
  workflow_call:
    outputs:
      artifact:
        description: Name of the uploaded APK artifact
        value: kiosk-apk
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode signing keystore (if provided)
        id: signing
        env:
          KS_B64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/kiosk.jks"
            echo "have_keystore=true" >> "$GITHUB_OUTPUT"
          else
            echo "No signing keystore secret set — building a DEBUG-signed APK."
            echo "have_keystore=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build signed release APK
        if: steps.signing.outputs.have_keystore == 'true'
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/kiosk.jks
          KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Build debug APK (no signing secrets)
        if: steps.signing.outputs.have_keystore != 'true'
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Collect APK as openmasjidkiosk.apk
        run: |
          set -e
          # Never bundle an *-unsigned.apk: an unsigned APK (or one signed with a throwaway per-run
          # debug key) is exactly what causes "App not installed" on update. Prefer the signed
          # release APK and fail loudly if release signing didn't happen.
          apk=$(find app/build/outputs/apk -name '*.apk' ! -name '*unsigned*' | head -1)
          if [ -z "$apk" ]; then echo "No signed APK produced (check signing secrets)"; exit 1; fi
          echo "Found $apk"
          cp "$apk" "$RUNNER_TEMP/openmasjidkiosk.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-apk
          path: ${{ runner.temp }}/openmasjidkiosk.apk
          if-no-files-found: error
